# Remap a multi-class segmask dataset into a binary floor segmentation dataset.
#
# Source labels (from render_scenes.py):
#   0 = background (ground plane / floor)
#   1 = robot
#   2 = distractor
#
# Target labels (for floor model training):
#   0 = background (not floor)
#   1 = field (floor surface)
#
# Any source label not listed here maps to default_label.
default_label = 0

[label_map]
0 = 1    # background -> robot
1 = 0    # floot -> robot

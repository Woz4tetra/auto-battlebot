# Experiment 1: Isolate lag (H1)
# Identical to simulation config except for command_delay_ms in [transmitter].
# Change command_delay_ms to sweep: 0, 50, 100, 200 ms.
#
# Run with:
#   ./scripts/run_simulation.sh simulation/sim_config_experiment1.toml
# (this script auto-launches the C++ binary with -c ./config/experiment1/)
# Or run sim + binary separately:
#   python simulation/sim_server.py simulation/sim_config_experiment1.toml
#   ./build/auto_battlebot -c ./config/experiment1/

[rgbd_camera]
type = "SimRgbdCamera"
sim_host = "127.0.0.1"
sim_port = 14882

[field_model]
type = "DeepLabMaskModel"
model_path = "models/field_deeplabv3_r50_2024-09-05_x86_64_sm75.engine"

[robot_mask_model]
type = "DeepLabMaskModel"
model_path = "models/robot_deeplabv3_mbv3_2026-03-07_x86_64_sm75.engine"
output_label = "OPPONENT"

[field_filter]
type = "PointCloudFieldFilter"
local_visualize_debug = false
distance_threshold = 0.1

[keypoint_model]
type = "YoloKeypointModel"
model_path = "models/yolo26n-pose_mr_stabs_mk2_2026-03-08_x86_64_sm75.engine"
label_indices = ["MR_STABS_MK2", "HOUSE_BOT"]
debug_visualization = false
threshold = 0.5

[[keypoint_model.label_map]]
label = "MR_STABS_MK1"
keypoints = ["MR_STABS_MK1_FRONT", "MR_STABS_MK1_BACK"]

[[keypoint_model.label_map]]
label = "MR_STABS_MK2"
keypoints = ["MR_STABS_MK2_FRONT", "MR_STABS_MK2_BACK"]

[[keypoint_model.label_map]]
label = "MRS_BUFF_MK1"
keypoints = ["MRS_BUFF_MK1_FRONT", "MRS_BUFF_MK1_BACK"]

[[keypoint_model.label_map]]
label = "MRS_BUFF_MK2"
keypoints = ["MRS_BUFF_MK2_FRONT", "MRS_BUFF_MK2_BACK"]

[[keypoint_model.label_map]]
label = "HOUSE_BOT"
keypoints = ["HOUSE_BOT_FRONT", "HOUSE_BOT_BACK"]

[[keypoint_model.label_map]]
label = "OPPONENT"
keypoints = ["OPPONENT_FRONT", "OPPONENT_BACK"]

[robot_filter]
type = "RobotFrontBackSimpleFilter"
default_frame_id = "OUR_ROBOT_1"

front_keypoints = [
    "MR_STABS_MK1_FRONT",
    "MR_STABS_MK2_FRONT",
    "MRS_BUFF_MK1_FRONT",
    "MRS_BUFF_MK2_FRONT",
    "HOUSE_BOT_FRONT",
    "OPPONENT_FRONT",
]
back_keypoints = [
    "MR_STABS_MK1_BACK",
    "MR_STABS_MK2_BACK",
    "MRS_BUFF_MK1_BACK",
    "MRS_BUFF_MK2_BACK",
    "HOUSE_BOT_BACK",
    "OPPONENT_BACK",
]

[robot_filter.label_mapping]
"MR_STABS_MK1" = ["OUR_ROBOT_1"]
"MR_STABS_MK2" = ["OUR_ROBOT_1"]
"MRS_BUFF_MK1" = ["OUR_ROBOT_2"]
"MRS_BUFF_MK2" = ["OUR_ROBOT_2"]
"HOUSE_BOT" = ["NEUTRAL_ROBOT_1"]
"OPPONENT" = ["THEIR_ROBOT_1", "THEIR_ROBOT_2", "THEIR_ROBOT_3"]

[navigation]
type = "PursuitNavigation"

[transmitter]
type = "SimTransmitter"
init_delay_seconds = 0.5
# ---- EXPERIMENT VARIABLE ----
# Artificial command delay in ms. Sweep: 0, 50, 100, 200
command_delay_ms = 200.0

[publisher]
type = "RosPublisher"

[runner]
max_loop_rate = 30.0

[ui]
enable = false
fullscreen = false
width = 1280
height = 800

[mcap]
enable = true
ignored_topics = []

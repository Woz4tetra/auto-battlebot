# PBR properties per material type (shared across all robots).
# cc_texture names refer to ambientCG / CC0 Textures asset IDs (tiling).
# texture_dir points to a directory of PBR images (Color, Roughness, etc.)
# that are applied using the model's UV mapping instead of tiling.


[materials.aluminum]
metallic = 1.0
roughness = 0.3
cc_texture = "Metal012"

[materials.steel]
metallic = 1.0
roughness = 0.4
cc_texture = "Metal030"

[materials.red_tpu]
metallic = 0.1
roughness = 0.1
cc_texture = "Plastic007"

[materials.blue_tpu]
metallic = 0.1
roughness = 0.1
cc_texture = "Plastic007_blue"

[materials.yellow_plastic]
metallic = 0.1
roughness = 0.1
cc_texture = "Plastic007_yellow"

[materials.foam]
metallic = 0.0
roughness = 0.85
cc_texture = "Rubber001"

[materials.paper]
metallic = 0.0
roughness = 0.9
cc_texture = "Paper001"

[materials.tin_foil]
metallic = 1.0
roughness = 0.1
cc_texture = "Foil003"

[materials.housebot]
# UV-mapped PBR textures loaded from a directory (Color, Roughness, Metalness,
# NormalGL, Displacement).  Unlike cc_texture, this preserves the model's UV
# layout instead of tiling with generated coordinates.
texture_dir = "../data/cc_textures/HouseBot"

[materials.mrs_buff_mk3_top_sticker]
texture_dir = "../data/cc_textures/mrs_buff_mk3_top_sticker"

[materials.mrs_buff_mk3_bottom_sticker]
texture_dir = "../data/cc_textures/mrs_buff_mk3_bottom_sticker"

[distractors]
# Each source has a path and a weight controlling how often its models are
# picked when filling the pool.  Weights are relative (they don't need to
# sum to 1).  A source with weight 3.0 is three times as likely to
# contribute a model as one with weight 1.0.
[[distractors.sources]]
path = "../data/distractor_models/objaverse"
weight = 0.5
kind = "objaverse"

[[distractors.sources]]
path = "../data/distractor_models/robots"
weight = 1.0
kind = "cad"

min_per_scene = 1
# Also controls how many distractor models are loaded into memory at once.
max_per_scene = 50
# Optional approximate VRAM budget (MB) across the whole loaded distractor pool.
# Set to 0 or remove to disable budget enforcement.
vram_budget_mb = 3500
# Precomputed per-model VRAM estimates used for pre-import budget checks.
vram_audit_csv = "training/data/distractor_models/distractor_gpu_audit.csv"
# Scale range as multiples of the robot's largest dimension.
# [0.5, 3.0] means distractors will be 0.5x to 3x the robot's size.
scale_range = [0.1, 2.0]
# Re-roll the distractor pool every N images (0 to keep the same pool all run).
shuffle_interval = 100

[environment]
hdri_dir = "../data/hdris"
cc_textures_dir = "../data/cc_textures"

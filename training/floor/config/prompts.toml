[floor]
tokenized_tags = ["arena floor", "floor", "ground", "mat", "painted floor", "logo", "red corner", "blue corner"]
sentence_prompts = [
    "entire arena floor surface",
    "combat arena floor including painted logos and corner paint",
    "single continuous floor plane inside the arena walls",
]

[negative]
tags = ["robot", "wall", "railing", "outside arena", "person", "shadow"]

[thresholds]
text = 0.18
box = 0.18

[fallback_seeding]
enabled = true
positive_samples = 18
negative_samples = 14

[server]
host = "127.0.0.1"
port = 14882
show_viewer = true
physics_dt = 0.01
substeps = 3
settle_steps = 100

[arena]
width = 2.4    # meters (NHRL cage)
height = 2.4
floor_mesh = "./assets/cage/floor.obj"
# Panoramic background image from simulation/assets/panoramas/.
# Composited behind the rendered scene. Comment out for plain background.
panorama = "greenhouse.jpg"

[camera]
res_width = 1280
res_height = 720
fov = 70.0           # ZED 2i approximate HFOV
pos = [0.0, -1.7, 1.5]  # x, y, z in meters
lookat = [0.0, 0.0, 0.0]

[[lights]]
type = "point"
pos = [0.0, 0.0, 3.5]
color = [1.0, 1.0, 1.0]
intensity = 150.0

[[lights]]
type = "directional"
dir = [-1.0, -1.0, -1.0]
color = [1.0, 1.0, 1.0]
intensity = 3.0

[our_robot]
model_path = "./assets/robots/mr_stabs_mk2/robot.urdf"
scale = 1.0
start_pos = [-0.5, 0.0, 0.025]
start_rotation = 45.0               # yaw in degrees at spawn
max_linear_speed = 2.0              # m/s at command=1.0
max_angular_speed = 6.0             # rad/s at command=1.0
model_euler = [0.0, 0.0, 0.0]      # URDF meshes already x-forward
wheel_radius = 0.025
track_width = 0.128
wheel_friction = 0.8
wheel_kp = 0.0
wheel_kv = 50.0
wheel_force_limit = 200.0
left_wheel_joints = ["left_wheel_joint"]
right_wheel_joints = ["right_wheel_joint"]

[[opponents]]
model_path = "./assets/robots/house_bot/robot.urdf"
scale = 1.0
start_pos = [0.75, 0.75, 0.15]
start_rotation = 225.0              # yaw in degrees at spawn
behavior = "static"                 # "static", "random_walk", "circular"
speed = 0.3                         # m/s for moving behaviors
model_euler = [0.0, 0.0, 0.0]
wheel_radius = 0.04
track_width = 0.2
wheel_friction = 0.8
wheel_kp = 0.0
wheel_kv = 50.0
wheel_force_limit = 200.0
left_wheel_joints = ["front_left_wheel_joint", "rear_left_wheel_joint"]
right_wheel_joints = ["front_right_wheel_joint", "rear_right_wheel_joint"]

[[opponents]]
model_path = "./assets/robots/mrs_buff_mk2.glb"
scale = 1.0
start_pos = [0.5, 0.0, 0.1]
start_rotation = 180.0              # yaw in degrees at spawn
behavior = "static"                 # "static", "random_walk", "circular"
speed = 0.3                         # m/s for moving behaviors
model_euler = [-90.0, 0.0, 0.0]

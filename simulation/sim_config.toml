[server]
host = "127.0.0.1"
port = 14882
physics_dt = 0.01
substeps = 10                       # mj_step calls per physics frame (effective dt = 0.001 s)
settle_steps = 50
max_physics_steps_per_frame = 10

[arena]
width = 2.4                         # meters (NHRL cage)
height = 2.4
floor_friction = 1.6
# Panoramic background image from simulation/assets/panoramas/.
# Composited behind the rendered scene. Comment out for plain background.
panorama = "greenhouse.jpg"

[camera]
res_width = 1280
res_height = 720
fov = 70.0                          # vertical FOV (matches ZED 2i ~70 deg VFOV)
pos = [0.0, -1.5, 1.0]
lookat = [0.0, 0.0, 0.0]

[our_robot]
model_path = "./assets/robots/mr_stabs_mk2/robot.urdf"
scale = 1.0
start_pos = [-0.5, 0.0, 0.025]
start_rotation = 45.0               # yaw in degrees at spawn
max_linear_speed = 2.0              # m/s at command=1.0 (software limit; physical max ~4.9 m/s)
max_angular_speed = 6.0             # rad/s at command=1.0
model_euler = [0.0, 0.0, 0.0]
wheel_radius = 0.025
track_width = 0.128
left_wheel_joints = ["left_wheel_joint"]
right_wheel_joints = ["right_wheel_joint"]

# Velocity actuator gain (N·m per rad/s error)
wheel_kv = 50.0
# Force limit derived from Repeat Mk4 motor at 25 A ESC limit
wheel_force_limit = 80.0

# MuJoCo joint dynamics (Repeat Robotics Mk4 Mini, 1104 3500kv, 28.5:1, 4S HV LiPo)
# Rotor inertia reflected to output shaft: I_rotor * gear^2 = 1.5e-7 * 812 = 1.2e-4 kg*m^2
wheel_armature = 1.2e-4
# Back-EMF damping referred to output: Ke^2/R * gear^2 * eta = 0.034 N*m*s/rad
wheel_damping = 0.034
# Gearbox stiction
wheel_frictionloss = 0.05
# Contact friction [longitudinal, lateral, rolling]
wheel_contact_friction = [1.6, 1.6, 0.001]

[[opponents]]
model_path = "./assets/robots/house_bot/robot.urdf"
scale = 1.0
start_pos = [0.75, 0.75, 0.123]
start_rotation = 225.0
behavior = "static"
speed = 0.3
model_euler = [0.0, 0.0, 0.0]
wheel_radius = 0.04
track_width = 0.2
wheel_kv = 50.0
wheel_force_limit = 200.0
left_wheel_joints = ["front_left_wheel_joint", "rear_left_wheel_joint"]
right_wheel_joints = ["front_right_wheel_joint", "rear_right_wheel_joint"]

[[opponents]]
model_path = "./assets/robots/mrs_buff_mk2.glb"
scale = 1.0
start_pos = [0.0, 0.0, 0.03]
start_rotation = 180.0
behavior = "circular"
speed = 2.0
model_euler = [0.0, 0.0, 0.0]

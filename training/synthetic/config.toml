[output]
image_dir = "../data/synthetic/images"
label_dir = "../data/synthetic/labels"
num_images = 20000
image_width = 1280
image_height = 720
# Number of camera viewpoints to render per scene arrangement.
# Higher values = faster generation but less object placement diversity.
images_per_scene = 10
# Minimum fraction of the robot's bounding box that must be filled with
# robot pixels (vs occluded by distractors). Frames below this are discarded.
min_robot_visibility = 0.10

[robot]
model_path = "../data/models/MR STABS MK2.gltf"
class_id = 0
# Scale factor applied to the imported model (1.0 = no scaling).
# Adjust if the OnShape export units don't match Blender's meters.
scale = 1.0

# 3D keypoint positions in model-local space (meters).
# Measure these from the CAD model origin in OnShape.
[robot.keypoints]
front = [0.1115, 0.0, -0.00313]
back = [-0.0206, 0.0, -0.00394205]

# Map OnShape part colors (RGB 0-255) to material types.
# Run `blenderproc run prepare_robot_model.py config.toml --inspect`
# to list all colors present in the GLTF for filling this out.
[[robot.color_mapping]]
color = [128, 128, 128]
tolerance = 20
material = "aluminum"

[[robot.color_mapping]]
color = [0, 0, 0]
tolerance = 30
material = "steel"

[[robot.color_mapping]]
color = [255, 32, 65]
tolerance = 20
material = "tpu"

[[robot.color_mapping]]
color = [165, 165, 165]
tolerance = 20
material = "foam"

[[robot.color_mapping]]
color = [102, 102, 102]
tolerance = 20
material = "foam"

[[robot.color_mapping]]
color = [232, 232, 232]
tolerance = 20
material = "paper"

# PBR properties per material type.
# cc_texture names refer to ambientCG / CC0 Textures asset IDs.
[materials.aluminum]
metallic = 1.0
roughness = 0.3
cc_texture = "Metal012"

[materials.steel]
metallic = 1.0
roughness = 0.4
cc_texture = "Metal030"

[materials.tpu]
metallic = 0.0
roughness = 0.5
cc_texture = "Plastic007"

[materials.foam]
metallic = 0.0
roughness = 0.85
cc_texture = "Rubber001"

[materials.paper]
metallic = 0.0
roughness = 0.9
cc_texture = "Paper001"

[distractors]
model_dirs = [
    "../data/distractor_models/objaverse",
    "../data/distractor_models/sam3d",
]
min_per_scene = 1
# Also controls how many distractor models are loaded into memory at once.
max_per_scene = 50
# Scale range as multiples of the robot's largest dimension.
# [0.5, 3.0] means distractors will be 0.5x to 3x the robot's size.
scale_range = [0.5, 3.0]
# Re-roll the distractor pool every N images (0 to keep the same pool all run).
shuffle_interval = 100

[environment]
hdri_dir = "../data/hdris"
cc_textures_dir = "../data/cc_textures"
# Extra ambientCG assets used for ground plane randomization.
# `download_ambientcg.py --from-config` downloads these alongside the robot materials.
ground_textures = [
    "Concrete034",
    "Concrete046",
    "Concrete042A",
    "Concrete031",
    "Asphalt031",
    "Ground037",
    "Ground054",
    "Ground068",
    "Ground048",
    "Tiles107",
    "Tiles138",
    "WoodFloor051",
    "WoodFloor043",
    "WoodFloor040",
    "PavingStones138",
]

[camera]
min_distance = 0.3
max_distance = 4.0
height_range = [0.1, 2.0]
# Gaussian noise added to the camera look-at target (meters)
look_at_noise = 0.4

[scene]
# Randomized range for the ground plane half-extent (meters).
ground_size_range = [0.5, 5.0]
# Randomized range for the radius within which objects are placed (meters).
arena_radius_range = [0.5, 1.5]
# Fraction of scenes that include a visible ground plane (0.0–1.0).
# The remainder show only the HDRI background behind the robot.
ground_visibility = 0.8

[randomization]
roughness_jitter = 0.1
hue_jitter_degrees = 5
light_count_range = [1, 3]
light_intensity_range = [100, 500]
light_color_temp_range = [3500, 6500]

# Probability the robot is airborne with a fully random tumbling orientation.
# The remainder of images place the robot on the ground in a ground_pitch pose.
air_probability = 0.3
# Height range (meters) above ground when airborne
air_height_range = [0.02, 0.4]

# Ground orientation: pitch (X-rotation) is fixed at +90° for right-side-up
# and -90° for upside-down.  Roll (Y-rotation, degrees) is configurable per
# orientation to compensate for the model not sitting perfectly flat after
# the GLTF axis conversion.  Yaw (Z-rotation) is always fully random.
ground_roll_upright = 9.587585
ground_roll_inverted = 9.587585

# Directional motion blur applied to robot and distractor objects.
# Probability that a frame receives motion blur (0.0–1.0).
motion_blur_probability = 0.3
# Blur kernel size range in pixels (randomly chosen per frame).
motion_blur_strength_range = [5, 15]

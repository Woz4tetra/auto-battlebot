[paths]
root = "training/floor/data"
raw_videos = "raw/videos"
processed_videos = "processed/videos"
metadata_dir = "metadata"
masks_dir = "masks/raw"
filtered_masks_dir = "masks/filtered"
export_dir = "exports/yolo_seg"
logs_dir = "logs"
checkpoints_dir = "checkpoints"

[scrape]
base_url = "https://brettzone.nhrl.io/brettZone/"
index_url = "https://brettzone.nhrl.io/brettZone/index.php"
robot_fights_url = "https://brettzone.nhrl.io/brettZone/robotFights.php"
max_fights = 100
random_seed = 4176
min_cameras = 1
retries = 3
timeout_seconds = 45
allow_all_camera_angles = true

[video]
target_width = 960
target_height = 540
target_fps = 30
crf = 18
preset = "fast"
chunk_seconds = 90
keep_audio = false

[sam3]
adapter_module = "training.floor.sam3_adapter"
checkpoint = ""
model_cfg = ""
device = "cuda"
amp = true
text_threshold = 0.18
box_threshold = 0.18
prompt_tags = [
    "arena floor",
    "floor",
    "ground",
    "mat",
    "painted floor",
    "logo",
    "red corner",
    "blue corner",
]
negative_tags = ["robot", "wall", "plexiglass", "outside arena", "person"]
fallback_positive_samples = 18
fallback_negative_samples = 14

[quality]
min_floor_fraction = 0.20
max_floor_fraction = 0.98
max_area_delta = 0.30
min_iou_with_previous = 0.65
closing_kernel = 9
opening_kernel = 5

[export]
stride = 15
min_polygon_points = 12
polygon_epsilon_ratio = 0.003
image_ext = ".jpg"

[cluster]
gpu_ids = [0, 1, 2]
workers_per_gpu = 1
async_prefetch = 24

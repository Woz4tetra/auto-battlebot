[project]
name = "auto-battlebot"
version = "0.1.0"
description = "Auto Battlebot Project"
requires-python = ">=3.10"
dependencies = [
    "ultralytics",
    "numpy>=2.0.0,<3.0.0",
    "matplotlib",
    "scipy",
    "minigencpp @ git+https://github.com/Woz4tetra/minigencpp.git",
    "tqdm",
    "livelossplot",
    "torchmetrics",
    "opencv-python>=4.5.0",
    # x86: PyPI torch; Jetson (aarch64): NVIDIA CUDA wheel per https://docs.nvidia.com/deeplearning/frameworks/install-pytorch-jetson-platform/
    "torch>=2.0.0; platform_machine == \"x86_64\"",
    "torch @ https://developer.download.nvidia.com/compute/redist/jp/v61/pytorch/torch-2.5.0a0%2B872d972e41.nv24.08.17622132-cp310-cp310-linux_aarch64.whl; platform_machine == \"aarch64\"",
    "pyyaml>=6.0",
    "tqdm>=4.60.0",
    "onnxscript",
    # x86 only: TensorRT/pyCUDA often unavailable or different on Jetson (aarch64)
    "tensorrt==10.14.1.48.post1; platform_machine == \"x86_64\"",
    "pycuda",
    "natsort",
    "google-auth",
    "google-auth-oauthlib",
    "google-api-python-client",
]

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = []

[tool.setuptools.packages.find]
where = ["."]
include = []

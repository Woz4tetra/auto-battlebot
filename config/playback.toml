# position_tracking = false
svo_real_time_mode = true

# [field_model]
# type = "YoloSegMaskModel"
# model_path = "data/models/yolo26n-seg_nhrl_field_2026-04-16_x86_64_sm89.engine"
# label_indices = ["FIELD", "OPPONENT", "HOUSE_BOT"]

[field_model]
type = "DeepLabMaskModel"
model_path = "data/models/field_deeplabv3p_r50_2026-04-29_x86_64_sm89.engine"

[robot_mask_model]
type = "YoloSegRobotBlobModel"
model_path = "data/models/yolo26n-seg_nhrl_robots_2026-04-26_x86_64_sm89.engine"
label_indices = [
  "OPPONENT",
  "OPPONENT",
  "HOUSE_BOT",
  "MR_STABS_MK2",
  "MRS_BUFF_MK3",
]
their_robot_labels = ["OPPONENT", "MR_STABS_MK2"]
neutral_robot_labels = ["HOUSE_BOT"]
field_labels = ["FIELD"]
confidence_threshold = 0.6
debug_visualization = false

[field_filter]
type = "PointCloudFieldFilter"
local_visualize_debug = false
distance_threshold = 0.05

[keypoint_model]
type = "YoloKeypointModel"
model_path = "data/models/yolo26n-pose_our_robots_2026-04-24_x86_64_sm89.engine"
label_indices = ["MR_STABS_MK2", "MRS_BUFF_MK3"]
debug_visualization = false
threshold = 0.6

[[keypoint_model.label_map]]
label = "MR_STABS_MK2"
keypoints = ["MR_STABS_MK2_FRONT", "MR_STABS_MK2_BACK"]

[[keypoint_model.label_map]]
label = "MRS_BUFF_MK3"
keypoints = ["MRS_BUFF_MK3_FRONT", "MRS_BUFF_MK3_BACK"]

[[keypoint_model.label_map]]
label = "HOUSE_BOT"
keypoints = ["HOUSE_BOT_FRONT", "HOUSE_BOT_BACK"]

[[keypoint_model.label_map]]
label = "OPPONENT"
keypoints = ["OPPONENT_FRONT", "OPPONENT_BACK"]

[robot_filter]
type = "RobotFrontBackSimpleFilter"
default_frame_id = "OUR_ROBOT_1"

front_keypoints = [
  "MR_STABS_MK2_FRONT",
  "MRS_BUFF_MK3_FRONT",
  "HOUSE_BOT_FRONT",
  "OPPONENT_FRONT",
]
back_keypoints = [
  "MR_STABS_MK2_BACK",
  "MRS_BUFF_MK3_BACK",
  "HOUSE_BOT_BACK",
  "OPPONENT_BACK",
]

robot_blob_min_length_meters = 0.08
robot_blob_max_length_meters = 0.7
robot_blob_min_confidence = 0.4
robot_blob_max_candidates = 8
blob_overwrite_min_distance_meters = 0.20
blob_overwrite_size_scale = 0.5
field_bounds_margin_meters = 0.5

[robot_filter.label_mapping]
"MR_STABS_MK2" = ["THEIR_ROBOT_1"]
"MRS_BUFF_MK3" = ["OUR_ROBOT_1"]
"HOUSE_BOT" = ["NEUTRAL_ROBOT_1"]
"OPPONENT" = ["THEIR_ROBOT_1", "THEIR_ROBOT_2", "THEIR_ROBOT_3"]

[target_selector]
type = "NearestTarget"

[navigation]
type = "PursuitNavigation"
angular_kp = 0.35
angular_kd = 0.01
angle_threshold = 1.7
velocity_ramp_far_distance = 1.5
velocity_ramp_near_distance = 0.75
velocity_ramp_min_scale = 0.5
wall_reverse_distance = 0.25       # set > 0 to reverse when within this distance of any wall
wall_heading_threshold = 1.047     # ~60 deg; heading must point toward wall to trigger reversal
max_linear_x = 0.75                # 0 = no limit
max_angular_z = 0.0                # 0 = no limit

[transmitter]
type = "PlaybackTransmitter"
init_delay_seconds = 0.4
lifted_deadzone_percent = 10
zero_deadzone_percent = 2

[publisher]
type = "RosPublisher"

[runner]
max_loop_rate = 30.0
default_opponent_count = 1
autonomy_enabled_by_default = true

[ui]
enable = true
fullscreen = false
battery_source = "None"

[mcap]
enable = false
ignored_topics = []

[health]
enable = true
tegrastats_enable = false
x86_tools_enable = true
sample_period_ms = 500

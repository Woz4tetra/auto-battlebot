[rgbd_camera]
type = "ZedRgbdCamera"
camera_fps = 60
# svo_file_path = "data/svo/1729981242.4295187.svo2"
# position_tracking = true
svo_file_path = "data/svo/mini_bot_2024-10-26T13-29-41.svo2"
position_tracking = false
svo_real_time_mode = true

[field_model]
type = "DeepLabMaskModel"
model_path = "models/field_deeplabv3_r50_2024-09-05_x86_64_sm89.engine"

[robot_mask_model]
type = "DeepLabMaskModel"
model_path = "models/robot_deeplabv3_mbv3_2026-03-07_x86_64_sm89.engine"
output_label = "OPPONENT"

[field_filter]
type = "PointCloudFieldFilter"
local_visualize_debug = false
distance_threshold = 0.1

[keypoint_model]
type = "YoloKeypointModel"
model_path = "models/yolo26n-pose_mr_stabs_mk2_2026-03-08_x86_64_sm89.engine"
label_indices = ["MR_STABS_MK2", "HOUSE_BOT"]
# model_path = "models/yolo11x-pose_2024-10-26_x86_64.engine"
# label_indices = [
#     "MR_STABS_MK1",
#     "MR_STABS_MK2",
#     "MRS_BUFF_MK1",
#     "MRS_BUFF_MK2",
#     "HOUSE_BOT",
#     "OPPONENT",
# ]
debug_visualization = false
threshold = 0.5

[[keypoint_model.label_map]]
label = "MR_STABS_MK1"
keypoints = ["MR_STABS_MK1_FRONT", "MR_STABS_MK1_BACK"]

[[keypoint_model.label_map]]
label = "MR_STABS_MK2"
keypoints = ["MR_STABS_MK2_FRONT", "MR_STABS_MK2_BACK"]

[[keypoint_model.label_map]]
label = "MRS_BUFF_MK1"
keypoints = ["MRS_BUFF_MK1_FRONT", "MRS_BUFF_MK1_BACK"]

[[keypoint_model.label_map]]
label = "MRS_BUFF_MK2"
keypoints = ["MRS_BUFF_MK2_FRONT", "MRS_BUFF_MK2_BACK"]

[[keypoint_model.label_map]]
label = "HOUSE_BOT"
keypoints = ["HOUSE_BOT_FRONT", "HOUSE_BOT_BACK"]

[[keypoint_model.label_map]]
label = "OPPONENT"
keypoints = ["OPPONENT_FRONT", "OPPONENT_BACK"]

[robot_filter]
type = "RobotFrontBackSimpleFilter"
default_frame_id = "OUR_ROBOT_1"

front_keypoints = [
    "MR_STABS_MK1_FRONT",
    "MR_STABS_MK2_FRONT",
    "MRS_BUFF_MK1_FRONT",
    "MRS_BUFF_MK2_FRONT",
    "HOUSE_BOT_FRONT",
    "OPPONENT_FRONT",
]
back_keypoints = [
    "MR_STABS_MK1_BACK",
    "MR_STABS_MK2_BACK",
    "MRS_BUFF_MK1_BACK",
    "MRS_BUFF_MK2_BACK",
    "HOUSE_BOT_BACK",
    "OPPONENT_BACK",
]

[robot_filter.label_mapping]
"MR_STABS_MK1" = ["OUR_ROBOT_1"]
"MR_STABS_MK2" = ["OUR_ROBOT_1"]
"MRS_BUFF_MK1" = ["OUR_ROBOT_2"]
"MRS_BUFF_MK2" = ["OUR_ROBOT_2"]
"HOUSE_BOT" = ["NEUTRAL_ROBOT_1"]
"OPPONENT" = ["THEIR_ROBOT_1", "THEIR_ROBOT_2", "THEIR_ROBOT_3"]

[navigation]
type = "PursuitNavigation"
angular_kp = 0.1
angular_kd = 0.1
max_angular_velocity = 15.625
max_linear_velocity = 2.0

[transmitter]
type = "PlaybackTransmitter"
init_delay_seconds = 0.2

[publisher]
type = "RosPublisher"

[runner]
max_loop_rate = 30.0

[ui]
enable = false
fullscreen = false
width = 1280
height = 800

[mcap]
enable = false
ignored_topics = []

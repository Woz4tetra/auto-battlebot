[server]
host = "127.0.0.1"
port = 14882

[arena]
width = 2.4    # meters (NHRL cage)
height = 2.4
floor_texture = "concrete"
# Panoramic background image from simulation/assets/panoramas/.
# Composited behind the rendered scene. Comment out for plain background.
panorama = "greenhouse.jpg"

[camera]
res_width = 1280
res_height = 720
fov = 70.0           # ZED 2i approximate HFOV
pos = [0.0, -1.7, 1.5]  # x, y, z in meters
lookat = [0.0, 0.0, 0.0]

[our_robot]
model_path = "./assets/robots/MR STABS MK2.gltf"
scale = 1.0
start_pos = [-0.5, 0.0, 0.0]
max_linear_speed = 2.0     # m/s at command=1.0
max_angular_speed = 6.0    # rad/s at command=1.0
# OnShape GLTF models point downward and are rotated 90 degrees.
# Apply this Euler correction (degrees) at load time to stand upright.
# Values match training/synthetic/render_scenes.py (pitch=90, roll=9.59).
model_euler = [90.0, 9.59, 0.0]

[opponent]
model_path = "./assets/robots/HOUSE BOT.glb"
scale = 1.0
start_pos = [0.5, 0.0, 0.0]
behavior = "random_walk"   # "static", "random_walk", "circular"
speed = 0.3                # m/s for moving behaviors
model_euler = [-90.0, 0.0, 0.0]

[output]
image_dir = "../data/synthetic/images"
label_dir = "../data/synthetic/labels"
# "keypoints_bbox" (default): YOLO pose labels with bbox + keypoints.
# "segmentation_bbox": YOLO segmentation polygons (bbox implied by polygons).
annotation_mode = "keypoints_bbox"
# annotation_mode = "segmentation_bbox"
num_images = 20000
image_width = 1280
image_height = 720
# Number of camera viewpoints to render per scene arrangement.
# Higher values = faster generation but less object placement diversity.
images_per_scene = 10
# Minimum visible fraction of robot pixels after occlusion.
# Computed as: visible instance pixels (with distractors) divided by
# unobstructed instance pixels from a distractor-free segmentation pass.
min_robot_visibility = 0.10
# Force periodic Blender data cleanup during long renders to avoid memory growth.
# Set to 0 to disable.
memory_cleanup_interval = 25

# Each [[robots]] entry defines a robot model that can appear in scenes.
# Per scene, 1..max_robots_per_scene robots are selected using weighted
# sampling without replacement.  See [scene].max_robots_per_scene.
[[robots]]
name = "MR_STABS_MK2"
model_path = "../data/models/MR STABS MK2.gltf"
class_id = 0
# Scale factor applied to the imported model (1.0 = no scaling).
# Adjust if the OnShape export units don't match Blender's meters.
scale = 1.0
# Relative probability of this robot being chosen for a scene.
weight = 0.5
# Ground orientation roll (Y-rotation, degrees) used when grounded.
# Pitch is fixed at +/-90 deg and yaw is always randomized.
ground_roll_upright = 9.587585
ground_roll_inverted = 9.587585

# 3D keypoint positions in model-local space (meters).
# Measure these from the CAD model origin in OnShape.
[robots.keypoints]
front = [0.1115, 0.0, -0.00313]
back = [-0.0206, 0.0, -0.00394205]

# Map OnShape part colors (RGB 0-255) to material types.
# Run `blenderproc run prepare_robot_model.py config.toml --inspect`
# to list all colors present in the GLTF for filling this out.
[[robots.color_mapping]]
color = [128, 128, 128]
tolerance = 1
material = "aluminum"

[[robots.color_mapping]]
color = [0, 0, 0]
tolerance = 1
material = "steel"

[[robots.color_mapping]]

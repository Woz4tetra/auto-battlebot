[rgbd_camera]
type = "ZedRgbdCamera"
camera_fps = 60
# svo_file_path = "data/svo/1729981242.4295187.svo2"
svo_file_path = "data/svo/2026-03-27T21-48-29.svo2"
position_tracking = true
# svo_file_path = "data/svo/mini_bot_2024-10-26T13-29-41.svo2"
# position_tracking = false
svo_real_time_mode = true
svo_start_frame = 4100

[field_model]
type = "YoloSegMaskModel"
model_path = "data/models/yolo_seg_field_2026-04-11_x86_64_sm89.engine"
label_indices = ["FIELD"]

[robot_mask_model]
type = "YoloSegRobotBlobModel"
model_path = "data/models/yolo_seg_opponents_2026-04-11_x86_64_sm89.engine"
label_indices = ["OPPONENT", "HOUSE_BOT", "FIELD"]
their_robot_labels = ["OPPONENT"]
neutral_robot_labels = ["HOUSE_BOT"]
field_labels = ["FIELD"]
confidence_threshold = 0.5
iou_threshold = 0.45
mask_threshold = 0.5
max_detections = 16

[field_filter]
type = "PointCloudFieldFilter"
local_visualize_debug = false
distance_threshold = 0.1

[keypoint_model]
type = "YoloKeypointModel"
model_path = "data/models/yolo26n-pose_mr_stabs_mk2_2026-03-08_x86_64_sm89.engine"
label_indices = ["MR_STABS_MK2", "HOUSE_BOT"]
# model_path = "data/models/yolo11x-pose_2024-10-26_x86_64.engine"
# label_indices = [
#     "MR_STABS_MK1",
#     "MR_STABS_MK2",
#     "MRS_BUFF_MK1",
#     "MRS_BUFF_MK2",
#     "HOUSE_BOT",
#     "OPPONENT",
# ]
debug_visualization = false
threshold = 0.5

[[keypoint_model.label_map]]
label = "MR_STABS_MK1"
keypoints = ["MR_STABS_MK1_FRONT", "MR_STABS_MK1_BACK"]

[[keypoint_model.label_map]]
label = "MR_STABS_MK2"
keypoints = ["MR_STABS_MK2_FRONT", "MR_STABS_MK2_BACK"]

[[keypoint_model.label_map]]
label = "MRS_BUFF_MK1"
keypoints = ["MRS_BUFF_MK1_FRONT", "MRS_BUFF_MK1_BACK"]

[[keypoint_model.label_map]]
label = "MRS_BUFF_MK2"
keypoints = ["MRS_BUFF_MK2_FRONT", "MRS_BUFF_MK2_BACK"]

[[keypoint_model.label_map]]
label = "HOUSE_BOT"
keypoints = ["HOUSE_BOT_FRONT", "HOUSE_BOT_BACK"]

[[keypoint_model.label_map]]
label = "OPPONENT"
keypoints = ["OPPONENT_FRONT", "OPPONENT_BACK"]

[robot_filter]
type = "RobotFrontBackSimpleFilter"
default_frame_id = "OUR_ROBOT_1"

front_keypoints = [
    "MR_STABS_MK1_FRONT",
    "MR_STABS_MK2_FRONT",
    "MRS_BUFF_MK1_FRONT",
    "MRS_BUFF_MK2_FRONT",
    "HOUSE_BOT_FRONT",
    "OPPONENT_FRONT",
    "OPPONENT_BLOB_A",
    "HOUSE_BOT_BLOB_A",
]
back_keypoints = [
    "MR_STABS_MK1_BACK",
    "MR_STABS_MK2_BACK",
    "MRS_BUFF_MK1_BACK",
    "MRS_BUFF_MK2_BACK",
    "HOUSE_BOT_BACK",
    "OPPONENT_BACK",
    "OPPONENT_BLOB_B",
    "HOUSE_BOT_BLOB_B",
]

robot_blob_min_length_meters = 0.08
robot_blob_max_length_meters = 0.7
robot_blob_min_confidence = 0.4
robot_blob_persistence_frames_required = 2
robot_blob_match_distance_meters = 0.35
robot_blob_tracked_timeout_seconds = 0.6
robot_blob_max_candidates = 8

[robot_filter.label_mapping]
"MR_STABS_MK1" = ["OUR_ROBOT_1"]
"MR_STABS_MK2" = ["OUR_ROBOT_1"]
"MRS_BUFF_MK1" = ["OUR_ROBOT_2"]
"MRS_BUFF_MK2" = ["OUR_ROBOT_2"]
"HOUSE_BOT" = ["NEUTRAL_ROBOT_1"]
"OPPONENT" = ["THEIR_ROBOT_1", "THEIR_ROBOT_2", "THEIR_ROBOT_3"]

[target_selector]
type = "NearestTarget"

[navigation]
type = "PursuitNavigation"
angular_kp = 0.1
angular_kd = 0.1
max_angular_velocity = 15.625
max_linear_velocity = 2.0

[transmitter]
type = "PlaybackTransmitter"
init_delay_seconds = 0.2

[publisher]
type = "RosPublisher"

[runner]
max_loop_rate = 30.0
default_opponent_count = 1
autonomy_enabled_by_default = true

[ui]
enable = true
fullscreen = false
battery_source = "None"

[mcap]
enable = false
ignored_topics = []

# Experiment 4: PD controller WITH hysteresis
# Tests whether hysteresis helps or hurts with derivative damping.
#
# Run with:
#   ./scripts/run_simulation.sh simulation/sim_config_experiment1.toml ./config/experiment4_hyst_on/

[rgbd_camera]
type = "SimRgbdCamera"
sim_host = "127.0.0.1"
sim_port = 14882

[field_model]
type = "DeepLabMaskModel"
model_path = "models/field_deeplabv3_r50_2024-09-05_x86_64_sm75.engine"

[robot_mask_model]
type = "NoopMaskModel"

[field_filter]
type = "PointCloudFieldFilter"
local_visualize_debug = false
distance_threshold = 0.1

[keypoint_model]
type = "NoopKeypointModel"

[robot_filter]
type = "GroundTruthRobotFilter"

[navigation]
type = "PursuitNavigation"
angular_kp = 3.0
angular_kd = 1.0
enable_hysteresis = true

[transmitter]
type = "SimTransmitter"
init_delay_seconds = 0.5
command_delay_ms = 0.0

[publisher]
type = "RosPublisher"

[runner]
max_loop_rate = 30.0

[ui]
enable = false
fullscreen = false
width = 1280
height = 800

[mcap]
enable = true
ignored_topics = []
